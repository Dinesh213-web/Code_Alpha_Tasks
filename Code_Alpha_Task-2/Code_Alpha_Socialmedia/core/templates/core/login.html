{% extends 'core/base.html' %}
{% block title %}Login — Social{% endblock %}

{% block content %}
<div style="max-width:400px; margin: 40px auto;">
  <div style="text-align:center; margin-bottom:32px;">
    <div style="font-family:'DM Serif Display',serif; font-size:2rem; color:var(--accent); margin-bottom:8px;">✦ social</div>
    <p class="text-muted">Sign in to your account</p>
  </div>

  <div class="card">
    {% if messages %}
    {% for message in messages %}
    <div class="msg {{ message.tags }}" style="margin-bottom:16px;">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus placeholder="Enter your username"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter your password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Sign In</button>
    </form>
  </div>

  <p style="text-align:center; margin-top:16px;" class="text-muted">
    Don't have an account? <a href="{% url 'register' %}" style="color:var(--accent); text-decoration:none;">Sign up</a>
  </p>
</div>
{% endblock %}
