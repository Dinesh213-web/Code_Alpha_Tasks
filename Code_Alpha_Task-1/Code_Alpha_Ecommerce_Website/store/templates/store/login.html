{% extends 'store/base.html' %}

{% block title %}Login — ShopEasy{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card card">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your account</p>
        </div>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-input" placeholder="Enter username" autofocus required>
                {% if form.username.errors %}<p class="error-msg">{{ form.username.errors.0 }}</p>{% endif %}
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-input" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
                Login →
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
        </div>
    </div>
</div>

<style>
.auth-wrapper { display: flex; justify-content: center; padding: 20px 0; }
.auth-card { width: 100%; max-width: 420px; }
.auth-header { text-align: center; padding: 32px 32px 24px; }
.auth-icon { font-size: 2.5rem; margin-bottom: 10px; }
.auth-header h1 { font-size: 1.6rem; font-weight: 700; }
.auth-header p { color: var(--text-muted); margin-top: 4px; }
.auth-form { padding: 0 32px 24px; }
.auth-footer { text-align: center; padding: 16px 32px 28px; border-top: 1px solid var(--border); font-size: 0.9rem; color: var(--text-muted); }
</style>
{% endblock %}
